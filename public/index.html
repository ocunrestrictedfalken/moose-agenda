<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MooseAgenda 🦌</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Auth Gate -->
<div id="authGate" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px">
  <div style="font-size:48px">🦌</div>
  <div style="font-size:22px;font-weight:700;color:var(--text)">MooseAgenda</div>
  <div style="font-size:14px;color:var(--text-dim)">Enter password to continue</div>
  <form id="authForm" style="display:flex;flex-direction:column;gap:10px;width:280px">
    <input type="password" id="authInput" placeholder="Password" style="text-align:center;font-size:16px;padding:12px" autofocus />
    <button type="submit" class="btn btn-primary">Enter the forest</button>
    <div id="authErr" style="color:var(--red);font-size:13px;text-align:center;display:none">Wrong password 🚫</div>
  </form>
</div>

<div class="app" id="mainApp" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">🦌</span>
      <span class="brand-name">MooseAgenda</span>
    </div>

    <nav class="nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">⬡</span> Dashboard
      </button>
      <button class="nav-btn" data-view="calendar">
        <span class="nav-icon">◈</span> Calendar
      </button>
      <button class="nav-btn" data-view="todos">
        <span class="nav-icon">◇</span> To-Dos
      </button>
      <a href="/games.html" class="nav-btn" style="text-decoration:none">
        <span class="nav-icon">⬟</span> Games
      </a>
    </nav>

    <div class="mini-cal" id="miniCal"></div>

    <div class="sidebar-footer">
      <div class="today-badge">
        <span id="sidebarDate"></span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Dashboard View -->
    <section class="view active" id="view-dashboard">
      <header class="view-header">
        <h1 class="view-title">Today's Field Report</h1>
        <div class="header-actions">
          <button class="btn btn-primary" id="addEventBtn">+ Event</button>
          <button class="btn btn-ghost" id="addTodoBtn">+ To-Do</button>
        </div>
      </header>

      <div class="dashboard-grid">
        <div class="card today-card">
          <div class="card-label">TODAY</div>
          <div id="todayEvents" class="event-list"></div>
          <div class="empty-state" id="todayEmpty" style="display:none">
            <span class="empty-icon">🌿</span>
            <p>Clear pastures ahead</p>
          </div>
        </div>

        <div class="card upcoming-card">
          <div class="card-label">COMING UP</div>
          <div id="upcomingEvents" class="event-list"></div>
          <div class="empty-state" id="upcomingEmpty" style="display:none">
            <span class="empty-icon">🌲</span>
            <p>Nothing on the horizon</p>
          </div>
        </div>

        <div class="card todos-card">
          <div class="card-label">TO-DO TRAIL</div>
          <div id="dashTodos" class="todo-list"></div>
          <div class="empty-state" id="todosEmpty" style="display:none">
            <span class="empty-icon">🍃</span>
            <p>All clear, big moose</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Calendar View -->
    <section class="view" id="view-calendar">
      <header class="view-header">
        <div class="cal-nav">
          <button class="btn btn-ghost" id="calPrev">‹</button>
          <h1 class="view-title" id="calTitle"></h1>
          <button class="btn btn-ghost" id="calNext">›</button>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost cal-mode active" data-mode="month">Month</button>
          <button class="btn btn-ghost cal-mode" data-mode="week">Week</button>
          <button class="btn btn-primary" id="addEventBtn2">+ Event</button>
        </div>
      </header>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <!-- Todos View -->
    <section class="view" id="view-todos">
      <header class="view-header">
        <h1 class="view-title">To-Do Trail</h1>
        <div class="header-actions">
          <div class="priority-filter">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="on-fire">🔥 On Fire</button>
            <button class="pill" data-filter="high-ground">🦌 High Ground</button>
            <button class="pill" data-filter="grazing">🌿 Grazing</button>
            <button class="pill" data-filter="eventually">🐌 Eventually</button>
          </div>
          <button class="btn btn-primary" id="addTodoBtn2">+ To-Do</button>
        </div>
      </header>
      <div id="fullTodoList" class="full-todo-list"></div>
    </section>

  </main>
</div>

</div><!-- /mainApp -->

<!-- Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="eventModalTitle">New Event</h2>
      <button class="modal-close" id="closeEventModal">✕</button>
    </div>
    <form id="eventForm">
      <input type="hidden" id="eventId" />
      <div class="form-group">
        <label>Event name <span class="required">*</span></label>
        <input type="text" id="eventName" placeholder="What's happening?" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date <span class="required">*</span></label>
          <input type="date" id="eventDate" required />
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="eventTime" />
        </div>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="eventLocation" placeholder="Where in the forest?" />
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="eventNotes" placeholder="Anything to remember..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Reminders</label>
        <div class="reminder-chips" id="reminderChips">
          <button type="button" class="chip active" data-val="1d">1 day before</button>
          <button type="button" class="chip active" data-val="1h">1 hour before</button>
          <button type="button" class="chip" data-val="30m">30 min before</button>
          <button type="button" class="chip" data-val="1w">1 week before</button>
          <button type="button" class="chip" data-val="none">No reminders</button>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="deleteEventBtn" style="display:none">Delete</button>
        <button type="submit" class="btn btn-primary">Save Event</button>
      </div>
    </form>
  </div>
</div>

<!-- Todo Modal -->
<div class="modal-overlay" id="todoModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="todoModalTitle">New To-Do</h2>
      <button class="modal-close" id="closeTodoModal">✕</button>
    </div>
    <form id="todoForm">
      <input type="hidden" id="todoId" />
      <div class="form-group">
        <label>Task <span class="required">*</span></label>
        <input type="text" id="todoText" placeholder="What needs doing?" required />
      </div>
      <div class="form-group">
        <label>Priority</label>
        <div class="priority-selector" id="prioritySelector">
          <button type="button" class="priority-btn" data-p="on-fire">🔥 On Fire</button>
          <button type="button" class="priority-btn active" data-p="grazing">🌿 Grazing</button>
          <button type="button" class="priority-btn" data-p="high-ground">🦌 High Ground</button>
          <button type="button" class="priority-btn" data-p="eventually">🐌 Eventually</button>
        </div>
      </div>
      <div class="form-group">
        <label>Due date</label>
        <input type="date" id="todoDue" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="deleteTodoBtn" style="display:none">Delete</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
