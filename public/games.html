<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Games — MooseAgenda</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { overflow: auto; }
    .games-wrap { max-width: 700px; margin: 0 auto; padding: 32px 20px; }
    .games-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
    .games-title { font-size:24px; font-weight:700; color:var(--text); }
    .game-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .game-tab { background:var(--bg3); border:1px solid var(--border); color:var(--text-dim); font-family:var(--font); font-size:13px; font-weight:600; padding:8px 18px; border-radius:20px; cursor:pointer; transition:all .15s; }
    .game-tab:hover { background:var(--bg4); color:var(--text); }
    .game-tab.active { background:var(--green); border-color:var(--green); color:var(--bg); }
    .game-area { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:28px; min-height:400px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
    .game-score { font-family:var(--mono); font-size:13px; color:var(--text-dim); margin-bottom:16px; display:flex; gap:20px; }
    .game-score span { color:var(--amber); font-weight:700; }

    /* ── Whack-a-Pest ── */
    .wap-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:12px 0 20px; width:100%; max-width:360px; }
    .wap-hole { background:var(--bg3); border:2px solid var(--border); border-radius:50%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:36px; cursor:pointer; transition:transform .1s, background .15s; user-select:none; }
    .wap-hole:hover { background:var(--bg4); }
    .wap-hole.active { background:var(--bg4); border-color:var(--green); transform:scale(1.08); }
    .wap-hole.whacked { background:var(--green-dim); transform:scale(0.9); }

    /* ── Antler Memory ── */
    .mem-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:100%; max-width:400px; margin:12px 0 20px; }
    .mem-card { aspect-ratio:1; background:var(--bg3); border:2px solid var(--border); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; transition:all .2s; user-select:none; }
    .mem-card.face-down { font-size:0; background:var(--bg4); }
    .mem-card.flipped { background:var(--bg3); border-color:var(--amber); }
    .mem-card.matched { background:rgba(76,175,110,.15); border-color:var(--green); opacity:.7; cursor:default; }

    /* ── Moose Dash ── */
    #dashCanvas { border:2px solid var(--border); border-radius:var(--radius-sm); background:#0a1209; display:block; width:100%; max-width:560px; }

    .game-btn { margin-top:12px; }
    .timer-bar { width:100%; max-width:360px; height:6px; background:var(--bg4); border-radius:3px; overflow:hidden; margin-bottom:16px; }
    .timer-fill { height:100%; background:var(--amber); border-radius:3px; transition:width .1s linear; }
  </style>
</head>
<body>
<div class="games-wrap">
  <div class="games-header">
    <span class="games-title">🎮 Game Break</span>
    <a href="/" class="btn btn-ghost" style="text-decoration:none">← Back</a>
  </div>
  <div class="game-tabs">
    <button class="game-tab active" data-game="whack">🎯 Whack-a-Pest</button>
    <button class="game-tab" data-game="memory">🃏 Antler Memory</button>
    <button class="game-tab" data-game="dash">🦌 Moose Dash</button>
  </div>
  <div class="game-area" id="gameArea"></div>
</div>
<script src="/js/games.js"></script>
</body>
</html>
